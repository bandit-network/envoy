services:
  postgres:
    image: postgres:16-alpine
    container_name: envoy-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: envoy
      POSTGRES_PASSWORD: envoy
      POSTGRES_DB: envoy
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U envoy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: envoy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Application services (use: docker compose --profile app up) ----

  api:
    profiles: [app]
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.api
    container_name: envoy-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://envoy:envoy@postgres:5432/envoy
      REDIS_URL: redis://redis:6379

  web:
    profiles: [app]
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.web
      args:
        NEXT_PUBLIC_PRIVY_APP_ID: ${NEXT_PUBLIC_PRIVY_APP_ID:-}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: envoy-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001

volumes:
  pgdata:
